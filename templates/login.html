<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ClarityCare — Sign In</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: Georgia, serif;
            background: #0f1a17;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .container {
            width: 100%;
            max-width: 420px;
            padding: 24px;
        }
        .logo {
            display: flex;
            align-items: center;
            gap: 10px;
            justify-content: center;
            margin-bottom: 40px;
        }
        .logo-icon {
            width: 36px; height: 36px;
            background: #7ec8a0;
            border-radius: 8px;
            display: flex; align-items: center; justify-content: center;
            font-size: 18px; color: #0f1a17;
        }
        .logo-name { font-size: 22px; color: white; font-weight: 400; }

        .card {
            background: rgba(255,255,255,0.04);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 16px;
            padding: 36px;
        }

        .tabs {
            display: flex;
            background: rgba(255,255,255,0.04);
            border-radius: 8px;
            padding: 4px;
            margin-bottom: 28px;
        }
        .tab-btn {
            flex: 1; padding: 8px; border: none;
            background: transparent; color: rgba(255,255,255,0.5);
            font-size: 14px; font-family: Georgia, serif;
            cursor: pointer; border-radius: 6px; transition: all 0.2s;
        }
        .tab-btn.active {
            background: #1a2f2a;
            color: white;
        }

        .form-group { margin-bottom: 16px; }
        label {
            display: block; font-size: 11px;
            color: rgba(255,255,255,0.4);
            text-transform: uppercase; letter-spacing: 0.06em;
            margin-bottom: 6px;
        }
        input {
            width: 100%; padding: 11px 14px;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 8px; color: white;
            font-size: 14px; font-family: Georgia, serif;
            transition: border 0.2s;
        }
        input:focus {
            outline: none;
            border-color: #7ec8a0;
        }
        input::placeholder { color: rgba(255,255,255,0.25); }

        .btn {
            width: 100%; padding: 12px;
            background: #7ec8a0; color: #0f1a17;
            border: none; border-radius: 8px;
            font-size: 15px; font-family: Georgia, serif;
            cursor: pointer; margin-top: 8px;
            transition: background 0.2s;
        }
        .btn:hover { background: #6ab88e; }
        .btn:disabled { background: #3a6b52; cursor: not-allowed; }

        .error-box {
            background: rgba(255,100,100,0.1);
            border: 1px solid rgba(255,100,100,0.3);
            border-radius: 8px; padding: 10px 14px;
            font-size: 13px; color: #ff8080;
            margin-top: 12px; display: none;
        }
        .error-box.visible { display: block; }

        .divider {
            text-align: center;
            font-size: 12px;
            color: rgba(255,255,255,0.2);
            margin: 24px 0 0;
        }
    </style>
</head>
<body>
<div class="container">
    <div class="logo">
        <div class="logo-icon">◈</div>
        <span class="logo-name">ClarityCare</span>
    </div>

    <div class="card">
        <div class="tabs">
            <button class="tab-btn active" onclick="showTab('login', this)">Sign In</button>
            <button class="tab-btn" onclick="showTab('register', this)">Create Account</button>
        </div>

        <!-- Login Form -->
        <div id="form-login">
            <div class="form-group">
                <label>Email</label>
                <input type="email" id="login-email" placeholder="you@facility.com">
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" id="login-password" placeholder="••••••••">
            </div>
            <button class="btn" onclick="login()">Sign In</button>
            <div class="error-box" id="login-error"></div>
        </div>

        <!-- Register Form -->
        <div id="form-register" style="display:none">
            <div class="form-group">
                <label>Your Name</label>
                <input type="text" id="reg-name" placeholder="Jane Smith">
            </div>
            <div class="form-group">
                <label>Email</label>
                <input type="email" id="reg-email" placeholder="you@facility.com">
            </div>
            <div class="form-group">
                <label>Facility Name</label>
                <input type="text" id="reg-facility" placeholder="Sunrise Gardens Senior Living">
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" id="reg-password" placeholder="Min. 8 characters">
            </div>
            <button class="btn" onclick="register()">Create Account</button>
            <div class="error-box" id="reg-error"></div>
        </div>

        <div class="divider">Senior Living Intelligence</div>
    </div>
</div>

<script>
    function showTab(name, el) {
        document.querySelectorAll('.tab-btn').forEach(t => t.classList.remove('active'));
        el.classList.add('active');
        document.getElementById('form-login').style.display = name === 'login' ? 'block' : 'none';
        document.getElementById('form-register').style.display = name === 'register' ? 'block' : 'none';
    }

    async function login() {
        const email = document.getElementById('login-email').value.trim();
        const password = document.getElementById('login-password').value;
        const errorBox = document.getElementById('login-error');
        errorBox.classList.remove('visible');

        if (!email || !password) {
            errorBox.textContent = 'Please fill in all fields.';
            errorBox.classList.add('visible');
            return;
        }

        try {
            const response = await fetch('/api/auth/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email, password })
            });
            const result = await response.json();
            if (result.success) {
                window.location.href = '/app';
            } else {
                errorBox.textContent = result.error;
                errorBox.classList.add('visible');
            }
        } catch {
            errorBox.textContent = 'Connection error. Please try again.';
            errorBox.classList.add('visible');
        }
    }

    async function register() {
        const name = document.getElementById('reg-name').value.trim();
        const email = document.getElementById('reg-email').value.trim();
        const facility = document.getElementById('reg-facility').value.trim();
        const password = document.getElementById('reg-password').value;
        const errorBox = document.getElementById('reg-error');
        errorBox.classList.remove('visible');

        if (!name || !email || !password) {
            errorBox.textContent = 'Please fill in all required fields.';
            errorBox.classList.add('visible');
            return;
        }

        try {
            const response = await fetch('/api/auth/register', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ name, email, facility, password })
            });
            const result = await response.json();
            if (result.success) {
                window.location.href = '/app';
            } else {
                errorBox.textContent = result.error;
                errorBox.classList.add('visible');
            }
        } catch {
            errorBox.textContent = 'Connection error. Please try again.';
            errorBox.classList.add('visible');
        }
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'Enter') {
            const loginVisible = document.getElementById('form-login').style.display !== 'none';
            if (loginVisible) login();
            else register();
        }
    });
</script>
</body>
</html>
