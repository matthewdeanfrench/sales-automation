<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ClarityCare — Audit Log</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: Georgia, serif; background: #f5f3ef; color: #2c2c2c; }

        header {
            background: #1a2f2a; color: white;
            padding: 16px 40px;
            display: flex; align-items: center; justify-content: space-between;
        }
        .logo { display: flex; align-items: center; gap: 10px; }
        .logo-icon {
            width: 32px; height: 32px; background: #7ec8a0;
            border-radius: 7px; display: flex; align-items: center;
            justify-content: center; font-size: 16px; color: #1a2f2a;
        }
        .logo-text h1 { font-size: 18px; font-weight: 400; color: white; }
        .header-nav a {
            color: rgba(255,255,255,0.6); text-decoration: none;
            font-size: 13px; margin-left: 24px;
        }
        .header-nav a:hover { color: white; }

        .container { max-width: 1000px; margin: 32px auto; padding: 0 20px; }

        .page-header {
            margin-bottom: 24px;
        }
        .page-header h2 { font-size: 24px; font-weight: 400; margin-bottom: 4px; }
        .page-header p { font-size: 13px; color: #999; }

        .stats-row {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
            gap: 16px;
            margin-bottom: 24px;
        }
        .stat-card {
            background: white;
            border-radius: 10px;
            padding: 20px;
            box-shadow: 0 1px 4px rgba(0,0,0,0.06);
        }
        .stat-card .number {
            font-size: 28px;
            color: #1a2f2a;
            letter-spacing: -0.02em;
        }
        .stat-card .label {
            font-size: 12px;
            color: #999;
            margin-top: 4px;
        }

        .card {
            background: white; border-radius: 12px;
            box-shadow: 0 1px 4px rgba(0,0,0,0.06);
            overflow: hidden;
        }
        .card-toolbar {
            padding: 16px 20px;
            border-bottom: 1px solid #f0ede8;
            display: flex; gap: 12px; align-items: center;
        }
        .filter-input {
            padding: 8px 12px;
            border: 1px solid #e8e4de;
            border-radius: 6px;
            font-size: 13px;
            font-family: Georgia, serif;
            background: #fafaf8;
        }
        .filter-input:focus { outline: none; border-color: #1a2f2a; }

        table { width: 100%; border-collapse: collapse; }
        th {
            background: #f9f8f6;
            padding: 12px 16px;
            text-align: left;
            font-size: 11px;
            color: #888;
            text-transform: uppercase;
            letter-spacing: 0.06em;
            font-weight: 400;
            border-bottom: 1px solid #f0ede8;
        }
        td {
            padding: 12px 16px;
            font-size: 13px;
            border-bottom: 1px solid #f9f8f6;
            color: #444;
        }
        tr:last-child td { border-bottom: none; }
        tr:hover td { background: #fafaf8; }

        .action-badge {
            display: inline-block;
            padding: 2px 8px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 400;
        }
        .badge-saved { background: #e8f5ee; color: #2c7a4e; }
        .badge-deleted { background: #fff0f0; color: #c0392b; }
        .badge-login { background: #e8f0ff; color: #2c4a9e; }
        .badge-generated { background: #fff8e8; color: #8a5c00; }
        .badge-default { background: #f0ede8; color: #666; }

        .empty { text-align: center; padding: 60px; color: #aaa; font-size: 15px; }
        .back-link {
            display: inline-block;
            color: #1a2f2a;
            text-decoration: none;
            font-size: 13px;
            margin-bottom: 20px;
        }
        .back-link:hover { text-decoration: underline; }
    </style>
</head>
<body>

<header>
    <div class="logo">
        <div class="logo-icon">◈</div>
        <div class="logo-text"><h1>ClarityCare</h1></div>
    </div>
    <nav class="header-nav">
        <a href="/app">Tools</a>
        <a href="/audit">Audit Log</a>
    </nav>
</header>

<div class="container">
    <a href="/app" class="back-link">← Back to Tools</a>

    <div class="page-header">
        <h2>Audit Log</h2>
        <p>Complete record of all user actions for compliance and security monitoring.</p>
    </div>

    <div class="stats-row" id="stats-row">
        <div class="stat-card">
            <div class="number" id="total-actions">—</div>
            <div class="label">Total actions</div>
        </div>
        <div class="stat-card">
            <div class="number" id="total-saves">—</div>
            <div class="label">Documents saved</div>
        </div>
        <div class="stat-card">
            <div class="number" id="total-deletes">—</div>
            <div class="label">Documents deleted</div>
        </div>
        <div class="stat-card">
            <div class="number" id="unique-users">—</div>
            <div class="label">Unique users</div>
        </div>
    </div>

    <div class="card">
        <div class="card-toolbar">
            <input type="text" class="filter-input" id="filter-input" 
                   placeholder="Filter by user, action, or resource..." 
                   oninput="filterLogs()">
        </div>
        <div id="log-container">
            <div class="empty">Loading audit log...</div>
        </div>
    </div>
</div>

<script>
    let allLogs = [];

    function getBadgeClass(action) {
        if (action.includes('saved')) return 'badge-saved';
        if (action.includes('deleted')) return 'badge-deleted';
        if (action.includes('login')) return 'badge-login';
        if (action.includes('generated')) return 'badge-generated';
        return 'badge-default';
    }

    function renderLogs(logs) {
        const container = document.getElementById('log-container');
        if (logs.length === 0) {
            container.innerHTML = '<div class="empty">No audit log entries found.</div>';
            return;
        }
        container.innerHTML = `
            <table>
                <thead>
                    <tr>
                        <th>Timestamp</th>
                        <th>User</th>
                        <th>Action</th>
                        <th>Resource</th>
                        <th>Details</th>
                        <th>IP Address</th>
                    </tr>
                </thead>
                <tbody>
                    ${logs.map(log => `
                        <tr>
                            <td>${log.timestamp}</td>
                            <td>${log.user_email || '—'}</td>
                            <td><span class="action-badge ${getBadgeClass(log.action)}">${log.action}</span></td>
                            <td>${log.resource || '—'}</td>
                            <td>${log.details || '—'}</td>
                            <td>${log.ip_address || '—'}</td>
                        </tr>
                    `).join('')}
                </tbody>
            </table>
        `;
    }

    function filterLogs() {
        const query = document.getElementById('filter-input').value.toLowerCase();
        const filtered = allLogs.filter(log =>
            (log.user_email || '').toLowerCase().includes(query) ||
            (log.action || '').toLowerCase().includes(query) ||
            (log.resource || '').toLowerCase().includes(query) ||
            (log.details || '').toLowerCase().includes(query)
        );
        renderLogs(filtered);
    }

    async function loadLogs() {
        try {
            const response = await fetch('/api/audit-log');
            allLogs = await response.json();

            document.getElementById('total-actions').textContent = allLogs.length;
            document.getElementById('total-saves').textContent = allLogs.filter(l => l.action === 'document_saved').length;
            document.getElementById('total-deletes').textContent = allLogs.filter(l => l.action === 'document_deleted').length;
            const uniqueUsers = new Set(allLogs.map(l => l.user_email).filter(Boolean));
            document.getElementById('unique-users').textContent = uniqueUsers.size;

            renderLogs(allLogs);
        } catch {
            document.getElementById('log-container').innerHTML = '<div class="empty">Error loading audit log.</div>';
        }
    }

    loadLogs();
</script>

</body>
</html>
